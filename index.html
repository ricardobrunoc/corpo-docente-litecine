  <div class="modal-overlay" id="teacherModal" aria-hidden="true">
    <article class="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
      <button class="modal-close" type="button" id="modalClose" aria-label="Fechar pop-up">×</button>
      <span class="modal-label">Mini bio</span>
      <h2 id="modalTitle"></h2>
      <p id="modalBio"></p>
      <a id="modalLattes" class="lattes-link" href="#" target="_blank" rel="noopener noreferrer">Ver currículo Lattes</a>
    </article>
  </div>

  <script>
    const board = document.getElementById('bubbleBoard');
    const cards = document.querySelectorAll('.teacher-card');
    const modal = document.getElementById('teacherModal');
    const modalTitle = document.getElementById('modalTitle');
    const modalBio = document.getElementById('modalBio');
    const modalLattes = document.getElementById('modalLattes');
    const modalClose = document.getElementById('modalClose');

    cards.forEach((card) => {
      card.addEventListener('mouseenter', () => {
        board.classList.add('is-paused');
      });

      card.addEventListener('mouseleave', () => {
        board.classList.remove('is-paused');
      });

      card.addEventListener('focus', () => {
        board.classList.add('is-paused');
      });

      card.addEventListener('blur', () => {
        board.classList.remove('is-paused');
      });

      card.addEventListener('click', () => {
        modalTitle.textContent = card.dataset.name;
        modalBio.textContent = card.dataset.bio;
        modalLattes.href = card.dataset.lattes;
        modal.classList.add('is-open');
        modal.setAttribute('aria-hidden', 'false');
        modalClose.focus();
      });
    });

    function closeModal() {
      modal.classList.remove('is-open');
      modal.setAttribute('aria-hidden', 'true');
    }

    modalClose.addEventListener('click', closeModal);

    modal.addEventListener('click', (event) => {
      if (event.target === modal) {
        closeModal();
      }
    });

    document.addEventListener('keydown', (event) => {
      if (event.key === 'Escape' && modal.classList.contains('is-open')) {
        closeModal();
      }
    });
  </script>
